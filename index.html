<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>e meter</title>

  <style>
    body {
      background: #111;
      color: #ddd;
      font-family: monospace;
      text-align: center;
    }

    #meter {
      width: 320px;
      height: 180px;
      margin: 40px auto;
      position: relative;
    }

    #needle {
      width: 2px;
      height: 130px;
      background: red;
      position: absolute;
      left: 50%;
      bottom: 20px;
      transform-origin: bottom center;
    }

    .controls {
      margin-top: 20px;
    }

    label {
      display: block;
      margin: 10px;
    }

    /* ── BLE ── */
    #ble {
      margin: 12px auto;
    }

    #ble-btn {
      background: none;
      border: none;
      color: #888;
      font-family: monospace;
      font-size: 1em;
      cursor: pointer;
      padding: 0;
    }

    #ble-btn:hover:not(:disabled) {
      color: #ddd;
    }

    #ble-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    #ble-status {
      color: #555;
    }

    #ble-status.connected {
      color: #4c4;
    }

    #ble-status.scanning {
      color: #cc4;
    }

    #ble-status.error {
      color: #c44;
    }

    /* ── residual alert ── */
    #residual-display {
      font-size: 11px;
      color: #555;
      margin: 4px auto;
      height: 16px;
      transition: color 0.1s;
    }

    #residual-display.alert-fall {
      color: #f44;
    }

    #residual-display.alert-rise {
      color: #4af;
    }

    #lobf-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #555;
      cursor: pointer;
      margin: 4px auto;
    }

    #lobf-label input {
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div id="meter">
    <div id="needle"></div>
  </div>

  <div class="controls">

    <label>
      Tone Arm (scroll)
      <br>
      <input id="ta" type="range" min="-1" max="1" step="0.01" value="0">
    </label>

    <label>
      Sensitivity (zoom)
      <br>
      <input id="sens" type="range" min="0.1" max="10" step="0.1" value="2">
    </label>

  </div>

  <div>µS: <span id="us">—</span></div>

  <div id="residual-display"></div>

  <label id="lobf-label">
    <input type="checkbox" id="lobf-check"> trend line
  </label>

  <div id="ble">
    <button id="ble-btn">⬡ connect</button>
    &nbsp;
    <span id="ble-status">disconnected</span>
  </div>

  <canvas id="poly" width="320" height="80"
    style="display:block; width:320px; height:80px; margin:12px auto;"></canvas>

  <script>
    // ── UUIDs (match animated meter / ESP32 firmware) ──
    const BLE_SERVICE_UUID = "454d4554-0000-1000-8000-00805f9b34fb";
    const BLE_CHAR_UUID    = "454d4554-4552-4c45-8d41-52454144494e";

    const needle = document.getElementById("needle");

    let toneArm   = 0;
    let sensitivity = 2;

    document.getElementById("ta").oninput   = e => { toneArm      = parseFloat(e.target.value); };
    document.getElementById("sens").oninput = e => { sensitivity  = parseFloat(e.target.value); };

    let baseline = null;
    let smooth   = null;
    const SMOOTH = 0.1;

    function updateNeedle(uS) {
      if (smooth   === null) smooth   = uS;
      if (baseline === null) baseline = uS;

      smooth   = SMOOTH * uS + (1 - SMOOTH) * smooth;
      baseline = 0.001  * smooth + 0.999 * baseline;

      let signal = smooth - baseline;
      let drive  = signal * sensitivity;
      let final  = Math.max(-1, Math.min(1, -drive + toneArm));
      let angle  = -90 + (final + 1) * 90;

      needle.style.transform = `rotate(${angle}deg)`;
    }

    // ── Polygram (canvas) ──
    const polyCanvas = document.getElementById("poly");
    const ctx        = polyCanvas.getContext("2d");
    const W = 320, H = 80;

    let polyData    = [];          // { t, uS }
    let polyMin     = Infinity;    // running min — updated incrementally
    let polyMax     = -Infinity;   // running max
    const WINDOW_MS = 30000;

    // ── line-of-best-fit config ──
    const LOBF_WINDOW_MS  = 2000;
    const RESIDUAL_THRESH = 0.1;

    let showLobf = false;
    document.getElementById("lobf-check").onchange = e => {
      showLobf = e.target.checked;
      if (!showLobf) clearResidual();
    };

    function linReg(pts) {
      const n = pts.length;
      if (n < 2) return null;
      let sx = 0, sy = 0, sxx = 0, sxy = 0;
      for (const p of pts) { sx += p.x; sy += p.y; sxx += p.x * p.x; sxy += p.x * p.y; }
      const denom = n * sxx - sx * sx;
      if (Math.abs(denom) < 1e-12) return null;
      const slope     = (n * sxy - sx * sy) / denom;
      const intercept = (sy - slope * sx) / n;
      return { slope, intercept };
    }

    const residualEl = document.getElementById("residual-display");
    let   alertTimer = null;

    function clearResidual() {
      residualEl.textContent = "";
      residualEl.className   = "";
    }

    function flashResidual(residual) {
      const sign = residual < 0 ? "\u25bc" : "\u25b2";
      const cls  = residual < 0 ? "alert-fall" : "alert-rise";
      residualEl.textContent = `! ${sign} ${Math.abs(residual).toFixed(3)} \u00b5S`;
      residualEl.className   = cls;
      clearTimeout(alertTimer);
      alertTimer = setTimeout(clearResidual, 2000);
    }

    // ── LOBF residual check throttled to ~4 hz ──
    let lastLobfCheck = 0;
    const LOBF_INTERVAL = 250;

    function updatePolygram(uS) {
      const now = Date.now();

      // push new point
      polyData.push({ t: now, uS });

      // prune old points from the front — no filter() allocation
      const cutoff = now - WINDOW_MS;
      let pruneCount = 0;
      while (pruneCount < polyData.length && polyData[pruneCount].t < cutoff) pruneCount++;
      if (pruneCount > 0) polyData.splice(0, pruneCount);

      // incremental min/max — full rescan only when old points were pruned
      if (pruneCount > 0) {
        polyMin = Infinity; polyMax = -Infinity;
        for (const p of polyData) {
          if (p.uS < polyMin) polyMin = p.uS;
          if (p.uS > polyMax) polyMax = p.uS;
        }
      } else {
        if (uS < polyMin) polyMin = uS;
        if (uS > polyMax) polyMax = uS;
      }

      // LOBF residual check (throttled)
      if (showLobf && now - lastLobfCheck >= LOBF_INTERVAL) {
        lastLobfCheck = now;
        const lobfCutoff = now - LOBF_WINDOW_MS;
        const lobfPts = [];
        for (const p of polyData) {
          if (p.t >= lobfCutoff) lobfPts.push({ x: p.t - lobfCutoff, y: p.uS });
        }
        const reg = linReg(lobfPts);
        if (reg) {
          const residual = uS - (reg.slope * (now - lobfCutoff) + reg.intercept);
          if (Math.abs(residual) >= RESIDUAL_THRESH) flashResidual(residual);
        }
      }
    }

    // ── canvas render loop — rAF, independent of BLE rate ──
    function renderPolygram() {
      requestAnimationFrame(renderPolygram);
      ctx.clearRect(0, 0, W, H);
      if (polyData.length < 2) return;

      const now   = Date.now();
      const pad   = Math.max((polyMax - polyMin) * 0.2, 2);
      const lo    = polyMin - pad;
      const range = (polyMax + pad - lo) || 1;

      const toY = v => H * (1 - (v - lo) / range);
      const toX = t => W * (1 - (now - t) / WINDOW_MS);

      // signal path
      ctx.beginPath();
      ctx.strokeStyle = "red";
      ctx.lineWidth   = 1.5;
      ctx.lineJoin    = "round";
      ctx.lineCap     = "round";
      for (let i = 0; i < polyData.length; i++) {
        const x = toX(polyData[i].t);
        const y = toY(polyData[i].uS);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();

      // trend line
      if (!showLobf) return;
      const lobfCutoff = now - LOBF_WINDOW_MS;
      const lobfPts = [];
      for (const p of polyData) {
        if (p.t >= lobfCutoff) lobfPts.push({ x: p.t - lobfCutoff, y: p.uS });
      }
      const reg = linReg(lobfPts);
      if (!reg) return;

      const leftOffset  = now - WINDOW_MS - lobfCutoff;
      const rightOffset = now - lobfCutoff;

      ctx.beginPath();
      ctx.strokeStyle = "#aa8800";
      ctx.lineWidth   = 1;
      ctx.globalAlpha = 0.7;
      ctx.setLineDash([3, 3]);
      ctx.moveTo(toX(now - WINDOW_MS), toY(reg.slope * leftOffset  + reg.intercept));
      ctx.lineTo(toX(now),             toY(reg.slope * rightOffset + reg.intercept));
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha = 1;
    }

    renderPolygram(); // kick off rAF loop

    function handleFrame(f) {
      const uS = f.smooth_uS ?? f.uS;
      if (uS == null) return;
      updateNeedle(uS);
      updatePolygram(uS);
      document.getElementById("us").textContent = uS.toFixed(2);
    }

    // ── BLE ──
      const bleBtn    = document.getElementById("ble-btn");
      const bleStatus = document.getElementById("ble-status");
      let bleDevice   = null;
      let bleChar     = null;

      function setBleStatus(text, cls) {
        bleStatus.textContent = text;
        bleStatus.className   = cls || "";
      }

      // ── attach notifications on a live server handle ──
      async function attachNotifications(server) {
        const service = await server.getPrimaryService(BLE_SERVICE_UUID);
        bleChar       = await service.getCharacteristic(BLE_CHAR_UUID);
        await bleChar.startNotifications();
        bleChar.addEventListener("characteristicvaluechanged", e => {
          try { handleFrame(JSON.parse(new TextDecoder().decode(e.target.value))); } catch (_) { }
        });
      }

      // ── reconnect loop — retries up to 3x on unexpected disconnect ──
      let intentionalDisconnect = false;

      async function handleDisconnect() {
        bleChar = null;
        if (intentionalDisconnect) {
          setBleStatus("disconnected", "");
          bleBtn.textContent = "⬡ connect";
          bleBtn.disabled    = false;
          return;
        }

        for (let i = 1; i <= 3; i++) {
          setBleStatus(`reconnecting (${i}/3)…`, "scanning");
          bleBtn.textContent = "⬡ disconnect";
          bleBtn.disabled    = true;
          await new Promise(r => setTimeout(r, 1000));
          try {
            const server = await bleDevice.gatt.connect();
            await attachNotifications(server);
            setBleStatus("● connected", "connected");
            bleBtn.textContent = "⬡ disconnect";
            bleBtn.disabled    = false;
            return;
          } catch (_) { }
        }

        // all retries exhausted
        setBleStatus("disconnected", "");
        bleBtn.textContent = "⬡ connect";
        bleBtn.disabled    = false;
      }

      async function bleConnect() {
        if (!navigator.bluetooth) {
          setBleStatus("no web bluetooth", "error");
          return;
        }

        if (bleDevice && bleDevice.gatt.connected) {
          intentionalDisconnect = true;
          bleDevice.gatt.disconnect();
          return;
        }

        bleBtn.disabled = true;
        setBleStatus("scanning…", "scanning");

        try {
          bleDevice = await navigator.bluetooth.requestDevice({
            filters: [{ services: [BLE_SERVICE_UUID] }]
          });

          intentionalDisconnect = false;
          bleDevice.addEventListener("gattserverdisconnected", handleDisconnect);

          setBleStatus("connecting…", "scanning");
          const server = await bleDevice.gatt.connect();
          await attachNotifications(server);

          setBleStatus("● connected", "connected");
          bleBtn.textContent = "⬡ disconnect";
          bleBtn.disabled    = false;

        } catch (err) {
          setBleStatus(err.name === "NotFoundError" ? "cancelled" : err.message, "error");
          bleBtn.textContent = "⬡ connect";
          bleBtn.disabled    = false;
        }
      }

      bleBtn.addEventListener("click", bleConnect);
  </script>

</body>

</html>
