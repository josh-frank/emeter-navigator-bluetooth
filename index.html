<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>e meter</title>

  <style>
    body {
      background: #111;
      color: #ddd;
      font-family: monospace;
      text-align: center;
    }

    #meter {
      width: 320px;
      height: 180px;
      margin: 40px auto;
      position: relative;
    }

    #needle {
      width: 2px;
      height: 130px;
      background: red;
      position: absolute;
      left: 50%;
      bottom: 20px;
      transform-origin: bottom center;
    }

    .controls {
      margin-top: 20px;
    }

    label {
      display: block;
      margin: 10px;
    }

    /* ── BLE ── */
    #ble {
      margin: 12px auto;
    }

    #ble-btn {
      background: none;
      border: none;
      color: #888;
      font-family: monospace;
      font-size: 1em;
      cursor: pointer;
      padding: 0;
    }

    #ble-btn:hover:not(:disabled) {
      color: #ddd;
    }

    #ble-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    #ble-status {
      color: #555;
    }

    #ble-status.connected {
      color: #4c4;
    }

    #ble-status.scanning {
      color: #cc4;
    }

    #ble-status.error {
      color: #c44;
    }

    /* ── DEX ── */
    #dex {
      margin: 12px auto;
    }

    #dex-btn {
      background: none;
      border: none;
      color: #888;
      font-family: monospace;
      font-size: 1em;
      cursor: pointer;
      padding: 0;
    }

    #dex-btn:hover:not(:disabled) {
      color: #ddd;
    }

    #dex-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    #dex-status {
      color: #555;
    }

    #dex-status.connected {
      color: #4c4;
    }

    #dex-status.scanning {
      color: #cc4;
    }

    #dex-status.error {
      color: #c44;
    }

    /* ── DEX call toast ── */
    #dex-toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: monospace;
      font-size: 0.9em;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease;
      pointer-events: none;
      z-index: 100;
    }

    #dex-toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
      pointer-events: auto;
    }

    #toast-label {
      color: #ddd;
    }

    #toast-label span.read {
      color: #f55;
    }

    #toast-label span.other {
      color: #888;
    }

    #toast-conf {
      color: #555;
      font-size: 0.85em;
    }

    .toast-btn {
      background: none;
      border: 1px solid #444;
      border-radius: 4px;
      color: #aaa;
      font-family: monospace;
      font-size: 0.9em;
      cursor: pointer;
      padding: 2px 8px;
      transition: border-color 0.1s, color 0.1s;
    }

    .toast-btn:hover {
      border-color: #aaa;
      color: #fff;
    }

    .toast-btn.yes:hover {
      border-color: #4c4;
      color: #4c4;
    }

    .toast-btn.no:hover {
      border-color: #c44;
      color: #c44;
    }

    #toast-dismiss {
      color: #444;
      background: none;
      border: none;
      font-family: monospace;
      cursor: pointer;
      padding: 0 0 0 4px;
      font-size: 1em;
    }

    #toast-dismiss:hover {
      color: #888;
    }
  </style>
</head>

<body>

  <div id="meter">
    <div id="needle"></div>
  </div>

  <div class="controls">

    <label>
      Tone Arm (scroll)
      <br>
      <input id="ta" type="range" min="-5" max="5" step="0.01" value="0">
    </label>

    <label>
      Sensitivity (zoom)
      <br>
      <input id="sens" type="range" min="0.1" max="10" step="0.1" value="2">
    </label>

  </div>

  <div id="squeeze-wrap" style="margin: 14px auto;">
    <button id="squeeze-btn" style="background:none; border:1px solid #555; border-radius:4px; color:#888;
             font-family:monospace; font-size:1em; cursor:pointer; padding:4px 14px;
             transition: border-color 0.1s, color 0.1s;">
      ◉ auto-squeeze
    </button>
    <span id="squeeze-status" style="color:#555; margin-left:8px;"></span>
  </div>

  <div>µS: <span id="us">—</span></div>

  <div id="ble">
    <button id="ble-btn">⬡ connect</button>
    &nbsp;
    <span id="ble-status">disconnected</span>
  </div>

  <div id="dex">
    <button id="dex-btn">⬡ dex</button>
    &nbsp;
    <span id="dex-status">disconnected</span>
  </div>

  <canvas id="poly" width="320" height="80" style="display:block; width:320px; height:80px; margin:12px auto;"></canvas>

  <!-- DEX call toast -->
  <div id="dex-toast">
    <span id="toast-label">● <span id="toast-label-text">read</span></span>
    <span id="toast-conf">0.00</span>
    <button class="toast-btn yes" id="toast-yes">👍</button>
    <button class="toast-btn no" id="toast-no">👎</button>
    <button id="toast-dismiss">✕</button>
  </div>

  <script>
    // ── UUIDs (match animated meter / ESP32 firmware) ──
    const BLE_SERVICE_UUID = "454d4554-0000-1000-8000-00805f9b34fb";
    const BLE_CHAR_UUID = "454d4554-4552-4c45-8d41-52454144494e";

    const DEX_URL = "wss://api.lolronhubbard.com/stream";

    const needle = document.getElementById("needle");

    let toneArm = 0;
    let sensitivity = 2;

    document.getElementById("ta").oninput = e => { toneArm = parseFloat(e.target.value); };
    document.getElementById("sens").oninput = e => { sensitivity = parseFloat(e.target.value); };

    // ── helpers to sync sliders to programmatic changes ──
    function setToneArm(v) {
      toneArm = v;
      const el = document.getElementById("ta");
      el.value = Math.max(parseFloat(el.min), Math.min(parseFloat(el.max), v));
    }
    function setSensitivity(v) {
      sensitivity = v;
      const el = document.getElementById("sens");
      el.value = Math.max(parseFloat(el.min), Math.min(parseFloat(el.max), v));
    }

    // ── Auto-squeeze ──
    const squeezeBtn = document.getElementById("squeeze-btn");
    const squeezeStat = document.getElementById("squeeze-status");
    let squeezing = false;
    let sqMin = Infinity;
    let sqMax = -Infinity;

    function squeezeStart() {
      squeezing = true;
      sqMin = Infinity;
      sqMax = -Infinity;
      squeezeBtn.style.borderColor = "#cc4";
      squeezeBtn.style.color = "#cc4";
      squeezeBtn.textContent = "◉ hold…";
      squeezeStat.textContent = "";
    }

    function squeezeCommit() {
      squeezing = false;
      squeezeBtn.style.borderColor = "#555";
      squeezeBtn.style.color = "#888";
      squeezeBtn.textContent = "◉ auto-squeeze";

      if (sqMin === Infinity || sqMax === sqMin) {
        squeezeStat.textContent = "no signal";
        return;
      }

      // We want the squeeze range to drive the needle ~1/3 of full deflection.
      // Full deflection = drive of 1.0 (signal * sensitivity = 1).
      // Target: (sqMax - sqMin) * sensitivity = 1/3  →  sensitivity = 1/3 / range
      const range = sqMax - sqMin;
      const newSens = (1 / 3) / range;

      // Center the needle on the peak of the squeeze (highest conductance = most arousal).
      // At peak: signal = sqMax - baseline_at_that_moment ≈ sqMax - sqMin (rough).
      // drive = (sqMax - sqMin) * newSens = 1/3.
      // We want final = 0 (center), so: -drive + toneArm = 0 → toneArm = drive = 1/3.
      // But current baseline may already be tracking, so use current smooth as anchor.
      const newTA = (smooth !== null)
        ? (smooth - (sqMin + sqMax) / 2) * newSens   // offset to center midpoint
        : 0;

      setSensitivity(parseFloat(newSens.toFixed(3)));
      setToneArm(parseFloat(newTA.toFixed(3)));

      squeezeStat.textContent = `sens=${newSens.toFixed(2)} ta=${newTA.toFixed(2)}`;
    }

    // Hold-to-squeeze: mousedown/touchstart → mouseup/touchend
    squeezeBtn.addEventListener("mousedown", squeezeStart);
    squeezeBtn.addEventListener("touchstart", e => { e.preventDefault(); squeezeStart(); }, { passive: false });
    window.addEventListener("mouseup", () => { if (squeezing) squeezeCommit(); });
    window.addEventListener("touchend", () => { if (squeezing) squeezeCommit(); });

    let baseline = null;
    let smooth = null;
    const SMOOTH = 0.1;

    function updateNeedle(uS) {
      if (smooth === null) smooth = uS;
      if (baseline === null) baseline = uS;

      smooth = SMOOTH * uS + (1 - SMOOTH) * smooth;
      baseline = 0.001 * smooth + 0.999 * baseline;

      let signal = smooth - baseline;
      let drive = signal * sensitivity;
      let final = Math.max(-1, Math.min(1, -drive + toneArm));
      let angle = -90 + (final + 1) * 90;

      needle.style.transform = `rotate(${angle}deg)`;
    }

    // ── Polygram (canvas) ──
    const polyCanvas = document.getElementById("poly");
    const ctx = polyCanvas.getContext("2d");
    const W = 320, H = 80;

    let polyData = [];
    let polyMin = Infinity;
    let polyMax = -Infinity;
    let polyTicks = [];        // { t, label } — DEX event markers
    const WINDOW_MS = 30000;

    function updatePolygram(uS) {
      const now = Date.now();
      const cutoff = now - WINDOW_MS;

      polyData.push({ t: now, uS });

      let pruneCount = 0;
      while (pruneCount < polyData.length && polyData[pruneCount].t < cutoff) pruneCount++;
      if (pruneCount > 0) polyData.splice(0, pruneCount);

      if (pruneCount > 0) {
        polyMin = Infinity; polyMax = -Infinity;
        for (const p of polyData) {
          if (p.uS < polyMin) polyMin = p.uS;
          if (p.uS > polyMax) polyMax = p.uS;
        }
      } else {
        if (uS < polyMin) polyMin = uS;
        if (uS > polyMax) polyMax = uS;
      }

      // prune old ticks
      polyTicks = polyTicks.filter(tk => tk.t >= cutoff);
    }

    function renderPolygram() {
      requestAnimationFrame(renderPolygram);
      ctx.clearRect(0, 0, W, H);
      if (polyData.length < 2) return;

      const now = Date.now();
      const pad = Math.max((polyMax - polyMin) * 0.2, 2);
      const lo = polyMin - pad;
      const range = (polyMax + pad - lo) || 1;

      const toY = v => H * (1 - (v - lo) / range);
      const toX = t => W * (1 - (now - t) / WINDOW_MS);

      // DEX event ticks
      for (const tk of polyTicks) {
        const x = toX(tk.t);
        if (x < 0 || x > W) continue;
        ctx.beginPath();
        ctx.strokeStyle = tk.label === "read" ? "rgba(255,80,80,0.5)" : "rgba(120,120,120,0.4)";
        ctx.lineWidth = 1;
        ctx.setLineDash([2, 3]);
        ctx.moveTo(x, 0);
        ctx.lineTo(x, H);
        ctx.stroke();
        ctx.setLineDash([]);

        // tiny label
        ctx.fillStyle = tk.label === "read" ? "rgba(255,80,80,0.7)" : "rgba(160,160,160,0.6)";
        ctx.font = "8px monospace";
        ctx.fillText(tk.label === "read" ? "R" : "·", x + 2, 10);
      }

      // signal path
      ctx.beginPath();
      ctx.strokeStyle = "red";
      ctx.lineWidth = 1.5;
      ctx.lineJoin = "round";
      ctx.lineCap = "round";
      for (let i = 0; i < polyData.length; i++) {
        const x = toX(polyData[i].t);
        const y = toY(polyData[i].uS);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
    }

    renderPolygram();

    function handleFrame(f) {
      const uS = f.smooth_uS ?? f.uS;
      if (uS == null) return;
      updateNeedle(uS);
      updatePolygram(uS);
      document.getElementById("us").textContent = uS.toFixed(2);

      // collect for auto-squeeze
      if (squeezing) {
        if (uS < sqMin) sqMin = uS;
        if (uS > sqMax) sqMax = uS;
      }

      // forward to DEX
      if (dexSocket && dexSocket.readyState === WebSocket.OPEN) {
        dexSocket.send(JSON.stringify(f));
      }
    }

    // ── BLE ──
    const bleBtn = document.getElementById("ble-btn");
    const bleStatus = document.getElementById("ble-status");
    let bleDevice = null;
    let bleChar = null;
    let intentionalDisconnect = false;

    let boundDisconnectHandler = null;
    let boundCharHandler = null;

    function setBleStatus(text, cls) {
      bleStatus.textContent = text;
      bleStatus.className = cls || "";
    }

    function charHandler(e) {
      try { handleFrame(JSON.parse(new TextDecoder().decode(e.target.value))); } catch (_) { }
    }

    function bleCleanup() {
      if (bleChar && boundCharHandler) {
        bleChar.removeEventListener("characteristicvaluechanged", boundCharHandler);
      }
      if (bleDevice && boundDisconnectHandler) {
        bleDevice.removeEventListener("gattserverdisconnected", boundDisconnectHandler);
      }
      bleChar = null;
      boundCharHandler = null;
      boundDisconnectHandler = null;
    }

    async function attachNotifications(server) {
      const service = await server.getPrimaryService(BLE_SERVICE_UUID);
      bleChar = await service.getCharacteristic(BLE_CHAR_UUID);
      await bleChar.startNotifications();
      boundCharHandler = charHandler;
      bleChar.addEventListener("characteristicvaluechanged", boundCharHandler);
    }

    async function handleDisconnect() {
      bleChar = null;
      if (intentionalDisconnect) {
        bleCleanup();
        setBleStatus("disconnected", "");
        bleBtn.textContent = "⬡ connect";
        bleBtn.disabled = false;
        return;
      }

      for (let i = 1; i <= 3; i++) {
        setBleStatus(`reconnecting (${i}/3)…`, "scanning");
        bleBtn.textContent = "⬡ disconnect";
        bleBtn.disabled = true;
        await new Promise(r => setTimeout(r, 1000));
        try {
          const server = await bleDevice.gatt.connect();
          await attachNotifications(server);
          setBleStatus("● connected", "connected");
          bleBtn.textContent = "⬡ disconnect";
          bleBtn.disabled = false;
          return;
        } catch (_) { }
      }

      bleCleanup();
      setBleStatus("disconnected", "");
      bleBtn.textContent = "⬡ connect";
      bleBtn.disabled = false;
    }

    async function bleConnect() {
      if (!navigator.bluetooth) {
        setBleStatus("no web bluetooth", "error");
        return;
      }

      if (bleDevice && bleDevice.gatt.connected) {
        intentionalDisconnect = true;
        bleDevice.gatt.disconnect();
        return;
      }

      bleBtn.disabled = true;
      setBleStatus("scanning…", "scanning");

      try {
        bleCleanup();
        bleDevice = null;

        bleDevice = await navigator.bluetooth.requestDevice({
          filters: [{ services: [BLE_SERVICE_UUID] }]
        });

        intentionalDisconnect = false;
        boundDisconnectHandler = handleDisconnect;
        bleDevice.addEventListener("gattserverdisconnected", boundDisconnectHandler);

        setBleStatus("connecting…", "scanning");
        const server = await bleDevice.gatt.connect();
        await attachNotifications(server);

        setBleStatus("● connected", "connected");
        bleBtn.textContent = "⬡ disconnect";
        bleBtn.disabled = false;

      } catch (err) {
        bleCleanup();
        bleDevice = null;
        setBleStatus(err.name === "NotFoundError" ? "cancelled" : err.message, "error");
        bleBtn.textContent = "⬡ connect";
        bleBtn.disabled = false;
      }
    }

    bleBtn.addEventListener("click", bleConnect);

    // ── DEX WebSocket ──
    const dexBtn = document.getElementById("dex-btn");
    const dexStatus = document.getElementById("dex-status");
    let dexSocket = null;
    let dexIntentionalClose = false;

    function setDexStatus(text, cls) {
      dexStatus.textContent = text;
      dexStatus.className = cls || "";
    }

    function dexConnect() {
      if (dexSocket && dexSocket.readyState === WebSocket.OPEN) {
        dexIntentionalClose = true;
        dexSocket.close();
        dexBtn.textContent = "⬡ dex";
        setDexStatus("disconnected", "");
        return;
      }

      dexIntentionalClose = false;
      setDexStatus("connecting…", "scanning");
      dexBtn.disabled = true;

      try {
        dexSocket = new WebSocket(DEX_URL);
      } catch (err) {
        setDexStatus(err.message, "error");
        dexBtn.disabled = false;
        return;
      }

      dexSocket.onopen = () => {
        setDexStatus("● connected", "connected");
        dexBtn.textContent = "⬡ dex off";
        dexBtn.disabled = false;
      };

      dexSocket.onclose = () => {
        dexBtn.textContent = "⬡ dex";
        dexBtn.disabled = false;
        if (dexIntentionalClose) {
          setDexStatus("disconnected", "");
        } else {
          setDexStatus("disconnected", "error");
        }
        dismissToast();
      };

      dexSocket.onerror = () => {
        setDexStatus("error", "error");
        dexBtn.textContent = "⬡ dex";
        dexBtn.disabled = false;
      };

      dexSocket.onmessage = e => {
        try {
          const msg = JSON.parse(e.data);
          if (msg.type === "call") showCall(msg);
        } catch (_) { }
      };
    }

    dexBtn.addEventListener("click", dexConnect);

    // ── DEX toast ──
    const toast = document.getElementById("dex-toast");
    const toastLabelText = document.getElementById("toast-label-text");
    const toastConf = document.getElementById("toast-conf");
    const toastYes = document.getElementById("toast-yes");
    const toastNo = document.getElementById("toast-no");
    const toastDismiss = document.getElementById("toast-dismiss");

    let toastEventId = null;
    let toastTimeout = null;

    function showCall(msg) {
      toastEventId = msg.event_id;

      toastLabelText.textContent = msg.label;
      toastLabelText.className = msg.label; // "read" or "other"
      toastConf.textContent = (msg.confidence * 100).toFixed(0) + "%";

      toast.classList.add("visible");

      // auto-dismiss after 8s with no response
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(dismissToast, 8000);

      // mark on polygram
      polyTicks.push({ t: Date.now(), label: msg.label });
    }

    function sendFeedback(confirmed) {
      if (!toastEventId) return;
      if (dexSocket && dexSocket.readyState === WebSocket.OPEN) {
        dexSocket.send(JSON.stringify({
          type: "feedback",
          event_id: toastEventId,
          label: confirmed,
        }));
      }
      dismissToast();
    }

    function dismissToast() {
      clearTimeout(toastTimeout);
      toast.classList.remove("visible");
      toastEventId = null;
    }

    toastYes.addEventListener("click", () => sendFeedback(true));
    toastNo.addEventListener("click", () => sendFeedback(false));
    toastDismiss.addEventListener("click", dismissToast);
  </script>

</body>

</html>
